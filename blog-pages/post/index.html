<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="文章详情 - 墨言博客">
  <title>文章详情 | 墨言</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- 样式 -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="logo">墨言</a>
      
      <ul class="nav-menu" id="navMenu">
        <!-- 由 config-loader.js 动态渲染 -->
      </ul>
      
      <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- 加载状态 -->
  <div id="loadingState" style="text-align: center; padding: calc(70px + 100px) 0;">
    <p style="color: var(--color-text-muted);">正在加载文章...</p>
  </div>

  <!-- 错误状态 -->
  <div id="errorState" style="display: none; text-align: center; padding: calc(70px + 100px) 0;">
    <p style="color: var(--color-text-muted);">文章加载失败，请检查文章ID是否正确</p>
    <a href="/" style="display: inline-block; margin-top: 1rem; color: var(--color-accent);">返回首页</a>
  </div>

  <!-- 文章头部 -->
  <header class="article-header" id="articleHeader" style="display: none;">
    <span class="article-category" id="articleCategory">生活</span>
    <h1 class="article-title" id="articleTitle">文章标题</h1>
    <div class="article-meta">
      <span class="author">墨言</span>
      <span class="post-date" id="articleDate">2026年3月7日</span>
    </div>
  </header>

  <!-- 文章特色图片 -->
  <figure class="article-featured-image" id="articleImageContainer" style="display: none;">
    <img id="articleImage" src="" alt="">
  </figure>

  <!-- 文章内容 -->
  <article class="article-body" id="articleBody" style="display: none;">
    <!-- 内容由 JavaScript 渲染 -->
  </article>

  <!-- 文章导航 -->
  <nav class="article-nav" id="articleNav" style="display: none;">
    <div class="article-nav-prev" id="navPrev">
      <span class="nav-label">上一篇</span>
      <a href="#" class="nav-title" id="navPrevTitle">上一篇文章标题</a>
    </div>
    <div class="article-nav-next" id="navNext">
      <span class="nav-label">下一篇</span>
      <a href="#" class="nav-title" id="navNextTitle">下一篇文章标题</a>
    </div>
  </nav>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">墨言</div>
      <p class="footer-desc">
        <!-- 由 config-loader.js 动态渲染 -->
      </p>
      <div class="footer-links">
        <!-- 由 config-loader.js 动态渲染 -->
      </div>
      <div class="footer-divider"></div>
      <p class="copyright"><!-- 由 config-loader.js 动态渲染 --></p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="../js/markdown.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/post-loader.js"></script>
  <script src="../js/config-loader.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
