<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="关于墨言 - 一个热爱生活的记录者">
  <title>关于 | 墨言</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- 样式 -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="logo">墨言</a>
      
      <ul class="nav-menu" id="navMenu">
        <!-- 由 config-loader.js 动态渲染 -->
      </ul>
      
      <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- 关于头部 -->
  <header class="about-header">
    <div class="container">
      <div class="about-avatar">
        <img src="../192x192.png" alt="墨言头像">
      </div>
      <h1 class="about-name">墨言</h1>
      <p class="about-role">记录者 / 摄影师 / 生活家</p>
    </div>
  </header>

  <!-- 关于内容 -->
  <main class="about-content">
    <div class="container">
      <div class="content-wrapper">
        <!-- 数据统计 -->
        <div class="about-stats">
          <div class="stat-item">
            <span class="stat-label">共写了</span>
            <span class="stat-number" id="postCount">--</span>
            <span class="stat-label">篇文章</span>
          </div>
        </div>

        <!-- 介绍内容 -->
        <div class="about-intro" id="aboutIntro">
          <!-- 由 about-loader.js 动态加载 -->
        </div>

      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">墨言</div>
      <p class="footer-desc">
        <!-- 由 config-loader.js 动态渲染 -->
      </p>
      <div class="footer-links">
        <!-- 由 config-loader.js 动态渲染 -->
      </div>
      <div class="footer-divider"></div>
      <p class="copyright"><!-- 由 config-loader.js 动态渲染 --></p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="../js/markdown.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/config-loader.js"></script>
  <script src="../js/about-loader.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
